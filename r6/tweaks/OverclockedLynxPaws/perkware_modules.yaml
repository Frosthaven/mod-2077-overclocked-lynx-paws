# ── Vendor Stock ─────────────────────────────────────────
# Add all modules to every ripperdoc, available from level 1

Vendors.OLP_Verticality:
  $type: gamedataVendorItem_Record
  generationPrereqs: []
  item: Items.OLP_VerticalityModule
  quantity: [ Vendors.Always_Present ]

Vendors.OLP_GeckoGrip:
  $type: gamedataVendorItem_Record
  generationPrereqs: []
  item: Items.OLP_GeckoGripModule
  quantity: [ Vendors.Always_Present ]

Vendors.OLP_Rebound:
  $type: gamedataVendorItem_Record
  generationPrereqs: []
  item: Items.OLP_ReboundModule
  quantity: [ Vendors.Always_Present ]

Vendors.OLP_ParkourRoll:
  $type: gamedataVendorItem_Record
  generationPrereqs: []
  item: Items.OLP_ParkourRollModule
  quantity: [ Vendors.Always_Present ]

Vendors.OLP_PredatorsPerch:
  $type: gamedataVendorItem_Record
  generationPrereqs: []
  item: Items.OLP_PredatorsPerchModule
  quantity: [ Vendors.Always_Present ]

# Append to all ripperdoc inventories
Vendors.$(vendor):
  $instances:
    - { vendor: bls_ina_se1_ripperdoc_01 }
    - { vendor: cct_dtn_ripdoc_01 }
    - { vendor: hey_spr_ripperdoc_01 }
    - { vendor: pac_wwd_ripperdoc_01 }
    - { vendor: std_arr_ripperdoc_01 }
    - { vendor: std_rcr_ripperdoc_01 }
    - { vendor: wat_kab_ripperdoc_01 }
    - { vendor: wat_kab_ripperdoc_02 }
    - { vendor: wat_kab_ripperdoc_03 }
    - { vendor: wat_lch_ripperdoc_01 }
    - { vendor: wat_nid_ripperdoc_01 }
    - { vendor: wbr_hil_ripdoc_01 }
    - { vendor: wbr_jpn_ripperdoc_01 }
    - { vendor: wbr_jpn_ripperdoc_02 }
    - { vendor: cz_stadium_ripperdoc_01 }
    - { vendor: cz_monument_ripperdoc_anderson }
    - { vendor: cz_monument_ripperdoc_farida }
    - { vendor: cz_con_ripdoc_01 }

  itemStock:
    - !append Vendors.OLP_Verticality
    - !append Vendors.OLP_GeckoGrip
    - !append Vendors.OLP_Rebound
    - !append Vendors.OLP_ParkourRoll
    - !append Vendors.OLP_PredatorsPerch
