# =========================================================
# Overclocked Lynx Paws — Perkware Integration
# Optional modules that gate parkour abilities when Perkware
# integration is enabled in mod settings.
# Requires: Perkware mod installed
# =========================================================

# ── Custom Stats ──────────────────────────────────────────

BaseStats.OLP_WallRunEquipped:
  $type: Stat
  enumName: OLP_WallRunEquipped
  max: 1
  min: 0
  decimalPlaces: 0

BaseStats.OLP_WallClimbEquipped:
  $type: Stat
  enumName: OLP_WallClimbEquipped
  max: 1
  min: 0
  decimalPlaces: 0

BaseStats.OLP_WallKickEquipped:
  $type: Stat
  enumName: OLP_WallKickEquipped
  max: 1
  min: 0
  decimalPlaces: 0

BaseStats.OLP_SafeLandingEquipped:
  $type: Stat
  enumName: OLP_SafeLandingEquipped
  max: 1
  min: 0
  decimalPlaces: 0

BaseStats.OLP_MantisGrabEquipped:
  $type: Stat
  enumName: OLP_MantisGrabEquipped
  max: 1
  min: 0
  decimalPlaces: 0

# ── Wall Run Module ──────────────────────────────────────

Items.OLP_VerticalityModule:
  $base: Items.Fragment
  $props: AutoFlats
  tags:
    - PerkwareModule
    - PerkwareUniqueStat
    - OLP_WallRunEquipped

  icon:
    atlasResourcePath: olp\icons\olp_perk_icons.inkatlas
    atlasPartName: netrunning_area_02_perk1

  parentAttachmentType: ParentAttachmentType.Slot

  placementSlots:
    - !append-once AttachmentSlots.CyberwareMod1
    - !append-once AttachmentSlots.CyberwareMod2
    - !append-once AttachmentSlots.CyberwareMod3
    - !append-once AttachmentSlots.CyberwareMod4
    - !append-once AttachmentSlots.CyberwareMod5

  displayName: LocKey#OLP_WallRider_Name
  localizedDescription: ""
  quality: Quality.Uncommon

  buyPrice:
    - Price.CyberwareModBasePrice
    - Price.BuyMultiplier
    - Price.ItemQualityMultiplier
    - Price.BuyPrice_StreetCred_Discount

  sellPrice:
    - Price.CyberwareModBasePrice
    - Price.ItemQualityMultiplier
    - Price.SellMultiplier

  OnEquip:
    - $type: gamedataGameplayLogicPackage_Record
      stackable: False
      UIData:
        $type: gamedataGameplayLogicPackageUIData_Record
        localizedDescription: LocKey#OLP_WallRider_Desc
        floatValues: []
        intValues: []
        nameValues: []
        stats: []
      effectors: []
      animationWrapperOverrides: []
      stats:
        - $type: ConstantStatModifier
          modifierType: Additive
          statType: BaseStats.OLP_WallRunEquipped
          value: 1

